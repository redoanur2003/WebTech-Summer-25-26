<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Registration form for AIUB</title>
</head>

<body>
    <center>
        <h1>American International University-Bangladesh</h1>
        <p>Where Leaders are Created</p>
        <h2>Student registration form for admission</h2>
    </center>
    <br>
    <br>

    <form action="">
        <table align="center">
            <tr>
                <td><label for="">Student First Name: </label>
                </td>
                <td><input id="firstName" type="text" placeholder="Enter your first name"></td>
            </tr>
            <tr>
                <td><label for="">Student Last Name: </label>
                </td>
                <td>
                    <input id="lastName" type="text" placeholder="Enter your last name">
                </td>
            </tr>
            <tr>
                <td><label for="">Email Address: </label>
                </td>
                <td>
                    <input id="email" type="email" placeholder="Enter your email address">
                </td>
            </tr>
            <tr>
                <td><label for="">Date of Birth: </label>
                </td>
                <td>
                    <input type="date" name="" id="">
                </td>
            </tr>
            <tr>
                <td><label for="">Father Name: </label>
                </td>
                <td><input id="father" type="text" placeholder="Enter your father name"></td>
            </tr>
            <tr>
                <td>
                    <label for="">Mother Name: </label>
                </td>
                <td>
                    <input type="text" name="" id="mName" placeholder="Enter your mother name">
                </td>
            </tr>
            <tr>
                <td><label for="">S.S.C Year:</label>
                </td>
                <td><input type="text" name="" id="syear" placeholder="SSC year"></td>
            </tr>
            <tr>
                <td><label for="">S.S.C Reg.No:</label>
                </td>
                <td><input type="text" name="" id="sreg" placeholder="SSC reg. no"></td>
            </tr>
            <tr>
                <td><label for="">S.S.C Roll no:</label>
                </td>
                <td><input type="text" name="" id="sroll" placeholder="SSC Roll no"></td>
            </tr>
            <tr>
                <td><label for="">S.S.C GPA:</label>
                </td>
                <td><input type="text" name="" id="sgpa" placeholder="SSC GPA"></td>
            </tr>
            <tr>
                <td><label for="">H.S.C Year:</label>
                </td>
                <td><input type="text" name="" id="hyear" placeholder="HSC year"></td>
            </tr>
            <tr>
                <td><label for="">H.S.C Reg.No:</label>
                </td>
                <td><input type="text" name="" id="hreg" placeholder="HSC reg. no"></td>
            </tr>
            <tr>
                <td><label for="">H.S.C Roll no:</label>
                </td>
                <td><input type="text" name="" id="hroll" placeholder="HSC roll no"></td>
            </tr>
            <tr>
                <td><label for="">H.S.C GPA:</label>
                </td>
                <td><input type="text" name="" id="hgpa" placeholder="HSC GPA"></td>
            </tr>
            <tr>
                <td><label for="">permanent Address:</label>
                </td>
                <td>
                    <textarea name="" id="pAddress" rows="5" cols="20"
                        placeholder="Enter Your Permanent Address"></textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Blood Group: </label>
                </td>
                <td>
                    <input type="text" id="blood">
                </td>
            </tr>
            <tr>
                <td><label for="">Upload Picture: </label></td>
                <td>
                    <input type="file" id="image">
                </td>
            </tr>
            <tr>
                <td><label for="">Gender: </label></td>
                <td>
                    <input type="radio" name="gender" value="Male" id="">Male
                </td>
                <td>
                    <input type="radio" name="gender" value="Female" id="">Female
                </td>
            </tr>
            <tr>
                <td><input type="submit" name="" value="Submit" id=""></td>
                <td><input type="submit" name="" value="Reset" id=""></td>
            </tr>

        </table>
    </form>
    <div>
        <h2>Select Your choses</h2>
        <input type="checkbox" name="" value="CSE" id="">CSE
        <input type="checkbox" name="" value="EEE" id="">EEE
        <input type="checkbox" name="" value="IP" id="">IP
        <input type="checkbox" name="" value="DS" id="">DS
    </div>

</body>

</html>
