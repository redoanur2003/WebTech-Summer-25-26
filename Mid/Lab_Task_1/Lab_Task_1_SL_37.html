<!DOCTYPE html>
<html lang="en">

<head>
    <title>Internship Opportunity Test</title>
</head>

<body>
    <center>
        <h1>
            The Career Development Office
        </h1>
        <h3>Student Internship Skill test</h3>
    </center>
    <br>
    <br>
    <form>
        <table align="center">
            <tr>
                <td><label>Student Name: </label></td>
                <td>
                    <input type="text" id="name" placeholder="Enter Your Name" required>
                </td>
            </tr>
            <tr>
                <td><label>Email Address: </label></td>
                <td>
                    <input type="email" id="email" placeholder="Enter Your Email" required>
                </td>
            </tr>
            <tr>
                <td><label>Preferred Internship Type: </label></td>
                <td>
                    <input type="radio" id="intern" name="intern" value="On-Site">On-Site
                    <input type="radio" id="intern" name="intern" value="Remote">Remote
                </td>
            </tr>
            <tr>
                <td><label>Internship Duration: </label></td>
                <td>
                    <select>
                        <option value="6 Week">6 Week</option>
                        <option value="3 Month">3 Month</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label>Skills of Interes: </label></td>
                <td>
                    <input type="checkbox" value="Web Development">Web Development
                    <input type="checkbox" value="Data Analysis">Data Analysis
                    <input type="checkbox" value="Mobile Apps">Mobile Apps
                </td>
            </tr>
            <tr>
                <td>
                <td><input type="submit" value="Reset"></td>
                </td>
            </tr>



        </table>
    </form>

</body>

</html>
